name: Deploy Supabase Functions

# Déploie les Edge Functions Supabase automatiquement.
# - À chaque push sur main qui touche supabase/functions/**
# - Ou manuellement (onglet Actions -> Run workflow)
# Nécessite le secret repo SUPABASE_ACCESS_TOKEN (Settings -> Secrets -> Actions).

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: fkjqlmtugzdluzshxqsk
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy edge functions
        run: |
          set -e
          supabase functions deploy analyze-account --project-ref "$PROJECT_REF"
          supabase functions deploy refresh-stats   --project-ref "$PROJECT_REF"
          supabase functions deploy pfm-connect      --project-ref "$PROJECT_REF"
          supabase functions deploy pfm-publish      --project-ref "$PROJECT_REF"
          supabase functions deploy pfm-sync         --project-ref "$PROJECT_REF"
          supabase functions deploy pfm-posts        --project-ref "$PROJECT_REF"
